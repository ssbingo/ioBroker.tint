version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 15
    ignore:
      # @types/node must stay at ^22 — our Node.js engine target is 22 LTS;
      # higher @types/node versions expose APIs that do not exist at runtime
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # React MUST stay at ^18.x — ioBroker Admin uses React 18 and the webpack↔vite
      # Module Federation bridge cannot share React between host and remote. React 19
      # uses Symbol('react.transitional.element') instead of Symbol('react.element'),
      # which Admin's React 18 renderer does not recognise → Minified React Error #31.
      # Only upgrade when Admin itself migrates to React 19.
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # TypeScript major bumps require intentional evaluation with npm run check
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      # @mui/material MUST stay at v6 — ioBroker Admin exposes MUI v6 via Module Federation;
      # MUI v9 uses a different Emotion API that crashes Admin's Emotion v6 during MF negotiation
      - dependency-name: "@mui/material"
        update-types: ["version-update:semver-major"]
      # Emotion packages must stay aligned with MUI v6 (Emotion v11)
      - dependency-name: "@emotion/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@emotion/styled"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
