version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default: 7
    open-pull-requests-limit: 15
    ignore:
      # @types/node must stay at ^22 — our Node.js engine target is 22 LTS;
      # higher @types/node versions expose APIs that do not exist at runtime
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
      # React 19 is the current target; block automatic bumps to React 20+ until evaluated
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      # TypeScript major bumps require intentional evaluation with npm run check
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
